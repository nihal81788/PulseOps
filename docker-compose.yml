version: '3.8'
services:
  redis:
    image: redis:7-alpine
    container_name: pulseops_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: pulseops_timescaledb
    environment:
      POSTGRES_USER: pulseops_user
      POSTGRES_PASSWORD: pulseops_secret
      POSTGRES_DB: pulseops_db
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  redis_data:
  timescale_data:
